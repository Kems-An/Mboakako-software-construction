# devops/docker/nginx.conf
# Nginx configuration for serving the Mboakako React SPA.
# Handles client-side routing by redirecting all 404s to index.html.

server {
    listen 80;
    server_name _;

    # Root directory where Vite built assets are placed
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for faster delivery
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json image/svg+xml font/woff2;

    # Static assets — long cache since Vite hashes filenames
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all unknown paths serve index.html
    # React Router handles the actual routing in the browser
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header X-XSS-Protection       "1; mode=block"   always;
    add_header Referrer-Policy        "strict-origin"   always;
}
