services:

  frontend:
    build:
      context: C:\Users\User\Desktop\mboakako\frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_SUPABASE_URL:      ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_APP_NAME:          Mboakako
    container_name: mboakako_frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - mboakako_net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: mboakako_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - mboakako_net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: mboakako_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: mboakako_admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - mboakako_net

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  mboakako_net:
    driver: bridge